<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Core SEO -->
    <title>CYI | Canadian Youth Institute</title>
    <meta
      name="description"
      content="CYI is a youth-led organization creating opportunities for young people across Canada to grow, lead, and make an impact."
    />
    <meta name="author" content="Canadian Youth Institute" />

    <!-- Open Graph (link previews) -->
    <meta property="og:title" content="CYI | Canadian Youth Institute" />
    <meta
      property="og:description"
      content="CYI brings together young people from across Canada through programs, events, and initiatives focused on leadership and civic engagement."
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://canadianyouthinstitute.ca/"
    />
    <meta
      property="og:image"
      content="https://canadianyouthinstitute.ca/og-image.png"
    />

    <!-- Social profiles -->
    <link
      rel="me"
      href="https://www.instagram.com/cyi_global/"
    />
    <link
      rel="me"
      href="https://ca.linkedin.com/company/canadian-youth-institute"
    />

    <!-- Favicon (from public/favicon.png) -->
    <link rel="icon" type="image/png" href="/favicon.png?v=1" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
