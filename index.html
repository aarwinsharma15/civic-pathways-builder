<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ======= PRIMARY SEO ======= -->
    <title>Canadian Youth Institute (CYI) | Poltics, Leadership &amp; </title>

      content="A youth-led organization creating opportunities for young Canadians to grow, lead, and make an impact."
