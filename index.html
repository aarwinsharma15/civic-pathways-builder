    <script type="application/ld+json">

      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Youth of Peel (YOP)?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Youth of Peel (YOP) is a youth-led non-profit organization based in the Region of Peel that empowers young people through leadership development, civic engagement, and real community impact opportunities."
          }
        },
        {
          "@type": "Question",
          "name": "What do we do?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "YOP helps youth break into politics, civic engagement, and advocacy for youth rights across Brampton, Mississauga, and Caledon. We provide opportunities to close the youth opportunity gap through placements, mentorship, networking, and advocacy."
          }
        },
        {
          "@type": "Question",
          "name": "How can I join?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You can join by becoming a member or by applying to the executive team. Visit the Membership page or Hiring page to get started."
          }
        }
      ]
    }
    </script>
